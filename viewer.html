<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Viewall ARt — Viewer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0f1420; font-family: -apple-system, system-ui, sans-serif; }
      #ar-container { position: absolute; inset: 0; }
      #overlay {
        position: absolute; inset: 0; z-index: 10;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 1.4rem; text-align: center; padding: 2rem;
        background: radial-gradient(circle at 50% 40%, #1b2436, #0f1420);
        color: #e8edf4;
      }
      #overlay.hidden { display: none; }
      #overlay .brand { font-size: 1.7rem; font-weight: 700; letter-spacing: 0.01em; }
      #overlay .brand span { color: #4fd1c5; }
      #overlay p { max-width: 24rem; color: #9fb0c8; line-height: 1.5; font-size: 1.05rem; }
      #start-btn {
        padding: 0.9rem 2.2rem; font-size: 1.05rem; font-weight: 600;
        color: #0f1420; background: #4fd1c5; border: none; border-radius: 999px; cursor: pointer;
      }
      #start-btn:disabled { opacity: 0.6; cursor: default; }
      #status { min-height: 1.2rem; max-width: 26rem; color: #ffd479; font-size: 1rem; line-height: 1.45; }
      #hint {
        position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 10;
        padding: 0.6rem 1.2rem; border-radius: 999px;
        background: rgba(15,20,32,0.7); color: #e8edf4; font-size: 0.9rem;
      }
      #hint.hidden { display: none; }
      #copy { position: absolute; bottom: 0.6rem; left: 0; right: 0; z-index: 10; text-align: center; color: #5a6b83; font-size: 0.72rem; }
    </style>
  </head>
  <body>
    <div id="ar-container"></div>

    <div id="overlay">
      <div class="brand">Viewall&nbsp;<span>ARt</span></div>
      <p>Point your camera at the artwork to bring it to life — 3D, sound, motion and touchable links.</p>
      <button id="start-btn" disabled>Loading…</button>
      <div id="status"></div>
    </div>

    <div id="hint" class="hidden">Aim at the artwork…</div>
    <div id="copy">© Sean Fortune · OLP (One Legged Publishing)</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
